<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Management - Multiplayer Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .score-form {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .score-form h3 {
            margin-bottom: 15px;
            color: #00ccff;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        input {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }
        
        input::placeholder { color: #888; }
        
        input[type="text"] { flex: 1; min-width: 150px; }
        input[type="number"] { width: 120px; }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-add {
            background: #00ff88;
            color: #1a1a2e;
        }
        
        .btn-add:hover {
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        
        .btn-delete {
            background: #ff6b6b;
            color: #fff;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        
        .btn-delete:hover {
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
        }
        
        .games-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        
        .games-tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
        }
        
        .games-tabs button {
            flex: 1;
            padding: 15px;
            background: transparent;
            color: #aaa;
            border-radius: 0;
        }
        
        .games-tabs button.active {
            background: rgba(255,255,255,0.1);
            color: #00ff88;
        }
        
        .games-content {
            padding: 20px;
        }
        
        .game-panel { display: none; }
        .game-panel.active { display: block; }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .score-item:last-child { border-bottom: none; }
        
        .score-item:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .rank {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            font-weight: bold;
        }
        
        .rank.gold { background: #ffd700; color: #1a1a2e; }
        .rank.silver { background: #c0c0c0; color: #1a1a2e; }
        .rank.bronze { background: #cd7f32; color: #1a1a2e; }
        
        .username { font-size: 1.1rem; }
        
        .score-value {
            font-size: 1.2rem;
            color: #00ff88;
            margin-right: 15px;
        }
        
        .refresh-btn {
            display: block;
            margin: 20px auto;
            background: #00ccff;
            color: #1a1a2e;
        }
        
        .refresh-btn:hover {
            box-shadow: 0 0 15px rgba(0,204,255,0.5);
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .back-link a {
            color: #00ccff;
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Score Management</h1>
        <p class="subtitle">Manage all player scores across all games</p>
        
        <div class="score-form">
            <h3>Add or Update Player Score</h3>
            <div class="form-row">
                <input type="text" id="usernameInput" placeholder="Username">
                <input type="number" id="scoreInput" placeholder="Score" min="0">
                <button class="btn-add" onclick="addOrUpdateScore()">Save Score</button>
            </div>
        </div>
        
        <div class="games-section">
            <div class="games-tabs">
                <button class="active" onclick="showGame('all')">All Games</button>
            </div>
            <div class="games-content">
                <div class="game-panel active" id="allPanel">
                    <div id="scoresList"></div>
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadScores()">🔄 Refresh Scores</button>
        
        <div class="back-link">
            <a href="/">← Back to Game Lobby</a>
        </div>
    </div>

    <script>
        const serverUrl = window.location.origin;
        
        async function loadScores() {
            try {
                const response = await fetch(`${serverUrl}/api/scores`);
                const scores = await response.json();
                displayScores(scores);
            } catch (error) {
                console.error('Error loading scores:', error);
                document.getElementById('scoresList').innerHTML = 
                    '<div class="empty-state">Error loading scores. Make sure the server is running!</div>';
            }
        }
        
        function displayScores(scores) {
            const list = document.getElementById('scoresList');
            const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            if (entries.length === 0) {
                list.innerHTML = '<div class="empty-state">No players yet! Play some games to create scores.</div>';
                return;
            }
            
            list.innerHTML = entries.map(([username, score], index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';
                
                return `
                    <div class="score-item">
                        <div class="player-info">
                            <span class="rank ${rankClass}">${index + 1}</span>
                            <span class="username">${username}</span>
                        </div>
                        <div>
                            <span class="score-value">${score}</span>
                            <button class="btn-delete" onclick="deleteScore('${username}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function addOrUpdateScore() {
            const username = document.getElementById('usernameInput').value.trim();
            const score = parseInt(document.getElementById('scoreInput').value);
            
            if (!username || isNaN(score)) {
                alert('Please enter both username and score!');
                return;
            }
            
            if (score < 0) {
                alert('Score cannot be negative!');
                return;
            }
            
            try {
                const response = await fetch(`${serverUrl}/api/scores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, score })
                });
                
                if (response.ok) {
                    document.getElementById('usernameInput').value = '';
                    document.getElementById('scoreInput').value = '';
                    loadScores();
                } else {
                    alert('Error saving score!');
                }
            } catch (error) {
                console.error('Error updating score:', error);
                alert('Error updating score!');
            }
        }
        
        async function deleteScore(username) {
            if (!confirm(`Delete ${username}'s score? This cannot be undone.`)) return;
            
            try {
                const response = await fetch(`${serverUrl}/api/scores/${username}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadScores();
                } else {
                    alert('Error deleting score!');
                }
            } catch (error) {
                console.error('Error deleting score:', error);
                alert('Error deleting score!');
            }
        }
        
        function showGame(game) {
            document.querySelectorAll('.games-tabs button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.game-panel').forEach(panel => panel.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(game + 'Panel').classList.add('active');
        }
        
        // Load scores on page load
        loadScores();
    </script>
</body>
</html>
